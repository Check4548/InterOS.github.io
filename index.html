<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My WebOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop"></div>

    <div id="taskbar">
        <div class="start-menu-btn">
            <img src="icon system/logo-os.png" alt="Start" onerror="this.src='https://cdn-icons-png.flaticon.com/512/174/174881.png'">
        </div>
        <div id="running-apps"></div>
        <div class="clock" id="clock">00:00</div>
    </div>

    <!-- Container untuk Window Aplikasi -->
    <div id="window-container"></div>

    <script src="script.js"></script>
</body>
</html>
